name: Dependabot Lockfile Update

on:
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-lockfiles:
    if: github.actor == 'dependabot[bot]'
    name: Refresh Gradle Lockfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install libcurl development headers
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Refresh dependency locks
        run: ./gradlew resolveAndLockAll --write-locks

      - name: Commit updated lockfiles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.lockfile settings-gradle.lockfile
          git diff --cached --quiet || git commit -m "chore: refresh Gradle lockfiles"
          git push
