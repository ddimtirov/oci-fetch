name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  checks: write
  attestations: write
  security-events: write

jobs:

  submit-dependencies:
    name: Submits all Gradle dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6

      - name: Install Linux library headers (outside the Gradle dependencies)
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

  build-linux:
    name: Build KMP Library & Linux Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6

      - name: Install Linux library headers (outside the Gradle dependencies)
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: 'https://gradle.com/terms-of-service'
          build-scan-terms-of-use-agree: 'yes'

      - name: Build and test KMP library
        run: ./gradlew build allTests

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-linux
          path: build/reports/tests/

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: build/test-results/**/TEST-*.xml
          check_name: Test Results (Linux)
          detailed_summary: true

      - name: Upload Detekt SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: build/reports/detekt/detekt.sarif
          category: detekt

      - name: Upload Detekt reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-reports
          path: build/reports/detekt/

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v7
        with:
          name: oci-fetch-metadata
          path: build/libs/*metadata*.jar

      - name: Attest metadata artifact
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: build/libs/*metadata*.jar

      - name: Upload JVM artifact
        uses: actions/upload-artifact@v7
        with:
          name: oci-fetch-jvm
          path: build/libs/*jvm*.jar

      - name: Attest JVM artifact
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: build/libs/*jvm*.jar

      - name: Upload JS klib
        uses: actions/upload-artifact@v7
        with:
          name: oci-fetch-js
          path: build/libs/*js*.klib

      - name: Attest JS klib
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: build/libs/*js*.klib

      - name: Upload WASM-JS klib
        uses: actions/upload-artifact@v7
        with:
          name: oci-fetch-wasm-js
          path: build/libs/*wasm-js*.klib

      - name: Attest WASM-JS klib
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: build/libs/*wasm-js*.klib

      - name: Upload Linux binary
        uses: actions/upload-artifact@v7
        with:
          name: oci-fetch-linux-x64
          path: build/bin/linuxX64/releaseExecutable/

      - name: Attest Linux binary
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: build/bin/linuxX64/releaseExecutable/*

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: false

      - name: Enrich SBOM with environment and build toolchain info
        run: |
          JAVA_VERSION=$(java -version 2>&1 | head -1)
          KOTLIN_VERSION=$(./gradlew --quiet kotlinVersion 2>/dev/null || grep -oP 'kotlin\s*=\s*"\K[^"]+' gradle/libs.versions.toml)
          GRADLE_VERSION=$(./gradlew --version | grep '^Gradle' | awk '{print $2}')
          OS_INFO=$(uname -a)
          GCC_VERSION=$(gcc --version 2>/dev/null | head -1 || echo "N/A")
          CURL_VERSION=$(curl --version 2>/dev/null | head -1 || echo "N/A")

          # Add build environment metadata as a top-level property in the CycloneDX SBOM
          jq --arg java "$JAVA_VERSION" \
             --arg kotlin "$KOTLIN_VERSION" \
             --arg gradle "$GRADLE_VERSION" \
             --arg os "$OS_INFO" \
             --arg gcc "$GCC_VERSION" \
             --arg curl "$CURL_VERSION" \
             --arg runner "${{ runner.os }}-${{ runner.arch }}" \
             '.metadata.properties += [
               {"name": "build:java-version", "value": $java},
               {"name": "build:kotlin-version", "value": $kotlin},
               {"name": "build:gradle-version", "value": $gradle},
               {"name": "build:os", "value": $os},
               {"name": "build:gcc-version", "value": $gcc},
               {"name": "build:curl-version", "value": $curl},
               {"name": "build:runner", "value": $runner}
             ]' sbom.cdx.json > sbom-enriched.cdx.json
          mv sbom-enriched.cdx.json sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom-linux
          path: sbom.cdx.json

      - name: Attest SBOM for Linux binary
        uses: actions/attest@v4
        with:
          subject-path: build/bin/linuxX64/releaseExecutable/*
          sbom-path: sbom.cdx.json

  build-windows:
    name: Build Windows Binary
    runs-on: windows-latest
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6

      - name: Install libcurl via vcpkg
        run: |
          vcpkg install curl:x64-windows
          echo "CURL_LIBRARY=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows" >> $env:GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: 'https://gradle.com/terms-of-service'
          build-scan-terms-of-use-agree: 'yes'

      - name: Build and test Windows binary
        run: ./gradlew mingwX64Binaries mingwX64Test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-windows
          path: build/reports/tests/

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: build/test-results/**/TEST-*.xml
          check_name: Test Results (Windows)
          detailed_summary: true

      - name: Upload Windows binary
        uses: actions/upload-artifact@v7
        with:
          name: oci-fetch-windows-x64
          path: build/bin/mingwX64/releaseExecutable/

      - name: Attest Windows binary
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: build/bin/mingwX64/releaseExecutable/*

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: false

      - name: Enrich SBOM with environment and build toolchain info
        shell: bash
        run: |
          JAVA_VERSION=$(java -version 2>&1 | head -1)
          KOTLIN_VERSION=$(grep -oP 'kotlin\s*=\s*"\K[^"]+' gradle/libs.versions.toml)
          GRADLE_VERSION=$(./gradlew --version | grep '^Gradle' | awk '{print $2}')
          OS_INFO=$(uname -a)
          GCC_VERSION=$(gcc --version 2>/dev/null | head -1 || echo "N/A")
          CURL_VERSION=$(curl --version 2>/dev/null | head -1 || echo "N/A")

          jq --arg java "$JAVA_VERSION" \
             --arg kotlin "$KOTLIN_VERSION" \
             --arg gradle "$GRADLE_VERSION" \
             --arg os "$OS_INFO" \
             --arg gcc "$GCC_VERSION" \
             --arg curl "$CURL_VERSION" \
             --arg runner "${{ runner.os }}-${{ runner.arch }}" \
             '.metadata.properties += [
               {"name": "build:java-version", "value": $java},
               {"name": "build:kotlin-version", "value": $kotlin},
               {"name": "build:gradle-version", "value": $gradle},
               {"name": "build:os", "value": $os},
               {"name": "build:gcc-version", "value": $gcc},
               {"name": "build:curl-version", "value": $curl},
               {"name": "build:runner", "value": $runner}
             ]' sbom.cdx.json > sbom-enriched.cdx.json
          mv sbom-enriched.cdx.json sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom-windows
          path: sbom.cdx.json

      - name: Attest SBOM for Windows binary
        uses: actions/attest@v4
        with:
          subject-path: build/bin/mingwX64/releaseExecutable/*
          sbom-path: sbom.cdx.json
