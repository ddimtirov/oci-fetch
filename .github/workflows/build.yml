name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  checks: write
  attestations: write
  security-events: write

jobs:

  submit-dependencies:
    name: Submits all Gradle dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6

      - name: Install Linux library headers (outside the Gradle dependencies)
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libunistring-dev

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

  build-linux:
    name: Build KMP Library & Linux Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6

      - name: Install Linux library headers (outside the Gradle dependencies)
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libunistring-dev

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: 'https://gradle.com/terms-of-service'
          build-scan-terms-of-use-agree: 'yes'

      - name: Add test registry CA to system trust store
        run: |
          sudo cp system-test/src/jvmTest/resources/certs/server.crt /usr/local/share/ca-certificates/zot-test.crt
          sudo update-ca-certificates

      - name: Build and test KMP library
        run: ./gradlew build allTests

      - name: Generate Anchore (external) SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: anchore.linux64.cdx.json
          upload-artifact: false

      - name: Munge external SBOM with environment and build toolchain info and layout the others
        run: |
          JAVA_VERSION=$(java -version 2>&1 | head -1)
          KOTLIN_VERSION=$(./gradlew --quiet kotlinVersion 2>/dev/null || grep -oP 'kotlin\s*=\s*"\K[^"]+' gradle/libs.versions.toml)
          GRADLE_VERSION=$(./gradlew --version | grep '^Gradle' | awk '{print $2}')
          OS_INFO=$(uname -a)
          GCC_VERSION=$(gcc --version 2>/dev/null | head -1 || echo "N/A")
          CURL_VERSION=$(curl --version 2>/dev/null | head -1 || echo "N/A")

          # Add build environment metadata as a top-level property in the CycloneDX SBOM
          jq --arg java "$JAVA_VERSION" \
             --arg kotlin "$KOTLIN_VERSION" \
             --arg gradle "$GRADLE_VERSION" \
             --arg os "$OS_INFO" \
             --arg gcc "$GCC_VERSION" \
             --arg curl "$CURL_VERSION" \
             --arg runner "${{ runner.os }}-${{ runner.arch }}" \
             '.metadata.properties += [
               {"name": "build:java-version", "value": $java},
               {"name": "build:kotlin-version", "value": $kotlin},
               {"name": "build:gradle-version", "value": $gradle},
               {"name": "build:os", "value": $os},
               {"name": "build:gcc-version", "value": $gcc},
               {"name": "build:curl-version", "value": $curl},
               {"name": "build:runner", "value": $runner}
             ]' anchore.linux64.cdx.json > sbom-enriched.cdx.json
          mv sbom-enriched.cdx.json anchore.linux64.cdx.json

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: "**/build/test-results/**/TEST-*.xml"
          check_name: Test Results (Linux)
          detailed_summary: true

      - name: Publish Detekt SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: oci-fetch-lib/build/reports/detekt/detekt.sarif
          category: detekt-lib

      - name: Publish Detekt SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: oci-fetch-cli/build/reports/detekt/detekt.sarif
          category: detekt-cli

      - name: Upload browsable reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reports-linux
          path: "**/build/reports/"

      - name: Upload SBOMs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sboms-linux
          path: "*.cdx.json"

      - name: Upload libraries
        uses: actions/upload-artifact@v7
        with:
          name: oci-fetch-lib-kmp
          path: oci-fetch-lib/build/libs/*

      - name: Upload Linux binary
        uses: actions/upload-artifact@v7
        with:
          name: oci-fetch-cli-linux64
          path: oci-fetch-cli/build/bin/linuxX64/releaseExecutable/*

      - name: Attest libraries
        uses: actions/attest@v4
        with:
          sbom-path: anchore.linux64.cdx.json
          subject-path: oci-fetch-lib/build/libs/*

      - name: Attest Linux binary
        uses: actions/attest@v4
        with:
          sbom-path: anchore.linux64.cdx.json
          subject-path: oci-fetch-cli/build/bin/linuxX64/releaseExecutable/*

  build-windows:
    name: Build Windows Binary
    runs-on: windows-latest
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6

      - name: Install libcurl via vcpkg
        run: |
          vcpkg install curl:x64-windows
          echo "CURL_LIBRARY=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows" >> $env:GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: 'https://gradle.com/terms-of-service'
          build-scan-terms-of-use-agree: 'yes'

      - name: Build and test Windows binary
        run: ./gradlew mingwX64Binaries mingwX64Test

      - name: Generate Anchore SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: anchore.windows64.cdx.json
          upload-artifact: false

      - name: Munge external SBOM with environment and build toolchain info and layout the others
        shell: bash
        run: |
          JAVA_VERSION=$(java -version 2>&1 | head -1)
          KOTLIN_VERSION=$(grep -oP 'kotlin\s*=\s*"\K[^"]+' gradle/libs.versions.toml)
          GRADLE_VERSION=$(./gradlew --version | grep '^Gradle' | awk '{print $2}')
          OS_INFO=$(uname -a)
          GCC_VERSION=$(gcc --version 2>/dev/null | head -1 || echo "N/A")
          CURL_VERSION=$(curl --version 2>/dev/null | head -1 || echo "N/A")

          jq --arg java "$JAVA_VERSION" \
             --arg kotlin "$KOTLIN_VERSION" \
             --arg gradle "$GRADLE_VERSION" \
             --arg os "$OS_INFO" \
             --arg gcc "$GCC_VERSION" \
             --arg curl "$CURL_VERSION" \
             --arg runner "${{ runner.os }}-${{ runner.arch }}" \
             '.metadata.properties += [
               {"name": "build:java-version", "value": $java},
               {"name": "build:kotlin-version", "value": $kotlin},
               {"name": "build:gradle-version", "value": $gradle},
               {"name": "build:os", "value": $os},
               {"name": "build:gcc-version", "value": $gcc},
               {"name": "build:curl-version", "value": $curl},
               {"name": "build:runner", "value": $runner}
             ]' anchore.windows64.cdx.json > sbom-enriched.cdx.json
          mv sbom-enriched.cdx.json anchore.windows64.cdx.json

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: "**/build/test-results/**/TEST-*.xml"
          check_name: Test Results (Windows)
          detailed_summary: true

      - name: Upload browsable reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reports-windows
          path: "**/build/reports/"

      - name: Upload SBOMs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sboms-windows
          path: "*.cdx.json"

      - name: Upload Windows binary
        uses: actions/upload-artifact@v7
        with:
          name: oci-fetch-cli-windows64
          path: oci-fetch-cli/build/bin/mingwX64/releaseExecutable/*

      - name: Attest Windows binary
        uses: actions/attest@v4
        with:
          sbom-path: anchore.windows64.cdx.json
          subject-path: oci-fetch-cli/build/bin/mingwX64/releaseExecutable/*
