name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  checks: write
  attestations: write
  security-events: write

jobs:

  submit-dependencies:
    name: Submits all Gradle dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6

      - name: Install Linux library headers (outside the Gradle dependencies)
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libunistring-dev

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

  build-linux:
    name: Build KMP Library & Linux Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6

      - name: Install Linux library headers (outside the Gradle dependencies)
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libunistring-dev

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: 'https://gradle.com/terms-of-service'
          build-scan-terms-of-use-agree: 'yes'

      - name: Add test registry CA to system trust store
        run: |
          sudo cp system-test/src/jvmTest/resources/certs/server.crt /usr/local/share/ca-certificates/zot-test.crt
          sudo update-ca-certificates

      - name: Build and test KMP library
        run: ./gradlew build allTests

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: build/test-results/**/TEST-*.xml
          check_name: Test Results (Linux)
          detailed_summary: true

      - name: Upload Detekt SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: build/reports/detekt/detekt.sarif
          category: detekt

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v7
        with:
          name: oci-fetch-metadata
          path: build/libs/*metadata*.jar

      - name: Upload JVM artifact
        uses: actions/upload-artifact@v7
        with:
          name: oci-fetch-jvm
          path: build/libs/*jvm*.jar

      - name: Upload JS klib
        uses: actions/upload-artifact@v7
        with:
          name: oci-fetch-js
          path: build/libs/*js*.klib

      - name: Upload WASM-JS klib
        uses: actions/upload-artifact@v7
        with:
          name: oci-fetch-wasm-js
          path: build/libs/*wasm-js*.klib

      - name: Attest libraries and metadata JAR together (SLSA provenance)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            build/libs/*metadata*.jar
            build/libs/*jvm*.jar
            build/libs/*js*.klib
            build/libs/*wasm-js*.klib

      - name: Upload Linux binary
        uses: actions/upload-artifact@v7
        with:
          name: oci-fetch-linux-x64
          path: build/bin/linuxX64/releaseExecutable/

      - name: Attest Linux binary (SLSA provenance)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: build/bin/linuxX64/releaseExecutable/*

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: false

      - name: Enrich SBOM with environment and build toolchain info
        run: |
          JAVA_VERSION=$(java -version 2>&1 | head -1)
          KOTLIN_VERSION=$(grep -oP 'kotlin\s*=\s*"\K[^"]+' gradle/libs.versions.toml)
          GRADLE_VERSION=$(./gradlew --version | grep '^Gradle' | awk '{print $2}')
          IMAGE_OS="${ImageOS:-unknown}"
          IMAGE_VERSION="${ImageVersion:-unknown}"
          LIBCURL_DEV_VERSION=$(dpkg-query -W -f='${Version}' libcurl4-openssl-dev 2>/dev/null || echo "not-installed")
          LIBUNISTRING_DEV_VERSION=$(dpkg-query -W -f='${Version}' libunistring-dev 2>/dev/null || echo "not-installed")

          # Add selected build metadata to the CycloneDX SBOM:
          # toolchains, base image identity, and libraries installed on top of the base image.
          jq --arg java "$JAVA_VERSION" \
             --arg kotlin "$KOTLIN_VERSION" \
             --arg gradle "$GRADLE_VERSION" \
             --arg image_os "$IMAGE_OS" \
             --arg image_version "$IMAGE_VERSION" \
             --arg libcurl_dev "$LIBCURL_DEV_VERSION" \
             --arg libunistring_dev "$LIBUNISTRING_DEV_VERSION" \
             '.metadata.properties += [
               {"name": "build:java-version", "value": $java},
               {"name": "build:kotlin-version", "value": $kotlin},
               {"name": "build:gradle-version", "value": $gradle},
               {"name": "build:base-image-os", "value": $image_os},
               {"name": "build:base-image-version", "value": $image_version},
               {"name": "build:installed-libcurl4-openssl-dev", "value": $libcurl_dev},
               {"name": "build:installed-libunistring-dev", "value": $libunistring_dev}
             ]' sbom.cdx.json > sbom-enriched.cdx.json
          mv sbom-enriched.cdx.json sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom-linux
          path: sbom.cdx.json

      - name: Attest SBOM for Linux binary
        uses: actions/attest@v4
        with:
          subject-path: build/bin/linuxX64/releaseExecutable/*
          sbom-path: sbom.cdx.json

  build-windows:
    name: Build Windows Binary
    runs-on: windows-latest
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6

      - name: Install libcurl via vcpkg
        run: |
          vcpkg install curl:x64-windows
          echo "CURL_LIBRARY=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows" >> $env:GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: 'https://gradle.com/terms-of-service'
          build-scan-terms-of-use-agree: 'yes'

      - name: Build and test Windows binary
        run: ./gradlew mingwX64Binaries mingwX64Test

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: build/test-results/**/TEST-*.xml
          check_name: Test Results (Windows)
          detailed_summary: true

      - name: Upload Windows binary
        uses: actions/upload-artifact@v7
        with:
          name: oci-fetch-windows-x64
          path: build/bin/mingwX64/releaseExecutable/

      - name: Attest Windows binary (SLSA provenance)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: build/bin/mingwX64/releaseExecutable/*

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: false

      - name: Enrich SBOM with environment and build toolchain info
        shell: bash
        run: |
          JAVA_VERSION=$(java -version 2>&1 | head -1)
          KOTLIN_VERSION=$(grep -oP 'kotlin\s*=\s*"\K[^"]+' gradle/libs.versions.toml)
          GRADLE_VERSION=$(./gradlew --version | grep '^Gradle' | awk '{print $2}')
          IMAGE_OS="${ImageOS:-unknown}"
          IMAGE_VERSION="${ImageVersion:-unknown}"
          VCPKG_CURL_VERSION=$(vcpkg list | grep -E '^curl:x64-windows[[:space:]]' | awk '{print $2}' | head -1 || true)
          if [ -z "$VCPKG_CURL_VERSION" ]; then
            VCPKG_CURL_VERSION="not-installed"
          fi

          jq --arg java "$JAVA_VERSION" \
             --arg kotlin "$KOTLIN_VERSION" \
             --arg gradle "$GRADLE_VERSION" \
             --arg image_os "$IMAGE_OS" \
             --arg image_version "$IMAGE_VERSION" \
             --arg vcpkg_curl "$VCPKG_CURL_VERSION" \
             '.metadata.properties += [
               {"name": "build:java-version", "value": $java},
               {"name": "build:kotlin-version", "value": $kotlin},
               {"name": "build:gradle-version", "value": $gradle},
               {"name": "build:base-image-os", "value": $image_os},
               {"name": "build:base-image-version", "value": $image_version},
               {"name": "build:installed-vcpkg-curl-x64-windows", "value": $vcpkg_curl}
             ]' sbom.cdx.json > sbom-enriched.cdx.json
          mv sbom-enriched.cdx.json sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom-windows
          path: sbom.cdx.json

      - name: Attest SBOM for Windows binary
        uses: actions/attest@v4
        with:
          subject-path: build/bin/mingwX64/releaseExecutable/*
          sbom-path: sbom.cdx.json
